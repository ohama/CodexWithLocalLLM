<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .game-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .main-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #gameCanvas {
            border: 3px solid #4a4a6a;
            background: #0f0f1a;
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .info-box {
            background: #2a2a4a;
            padding: 15px;
            border-radius: 8px;
            min-width: 120px;
        }
        .info-box h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .info-box .value {
            font-size: 24px;
            font-weight: bold;
            color: #4fc3f7;
        }
        #nextCanvas {
            border: 2px solid #4a4a6a;
            background: #0f0f1a;
            display: block;
            margin: 0 auto;
        }
        .controls {
            background: #2a2a4a;
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.8;
        }
        .controls kbd {
            background: #4a4a6a;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .overlay h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #4fc3f7;
        }
        .overlay p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        .overlay button {
            background: #4fc3f7;
            color: #1a1a2e;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .overlay button:hover {
            background: #29b6f6;
        }
        .paused {
            color: #ffeb3b !important;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="main-panel">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
        </div>
        <div class="side-panel">
            <div class="info-box">
                <h3>Score</h3>
                <div class="value" id="score">0</div>
            </div>
            <div class="info-box">
                <h3>Level</h3>
                <div class="value" id="level">1</div>
            </div>
            <div class="info-box">
                <h3>Lines</h3>
                <div class="value" id="lines">0</div>
            </div>
            <div class="info-box">
                <h3>Next</h3>
                <canvas id="nextCanvas" width="100" height="100"></canvas>
            </div>
            <div class="controls">
                <kbd>←</kbd> <kbd>→</kbd> Move<br>
                <kbd>↑</kbd> Rotate<br>
                <kbd>↓</kbd> Soft Drop<br>
                <kbd>Space</kbd> Hard Drop<br>
                <kbd>P</kbd> Pause
            </div>
        </div>
    </div>
    <div class="overlay" id="overlay">
        <h2 id="overlayTitle">Game Over</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const levelEl = document.getElementById('level');
        const linesEl = document.getElementById('lines');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const finalScoreEl = document.getElementById('finalScore');

        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 30;
        const NEXT_BLOCK_SIZE = 20;

        const COLORS = [
            '#00f0f0', // I - Cyan
            '#f0f000', // O - Yellow
            '#a000f0', // T - Purple
            '#00f000', // S - Green
            '#f00000', // Z - Red
            '#0000f0', // J - Blue
            '#f0a000'  // L - Orange
        ];

        const SHAPES = [
            [[1,1,1,1]],                    // I
            [[1,1],[1,1]],                  // O
            [[0,1,0],[1,1,1]],              // T
            [[0,1,1],[1,1,0]],              // S
            [[1,1,0],[0,1,1]],              // Z
            [[1,0,0],[1,1,1]],              // J
            [[0,0,1],[1,1,1]]               // L
        ];

        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameOver = false;
        let paused = false;
        let dropInterval = 1000;
        let lastDrop = 0;
        let animationId = null;

        function createBoard() {
            return Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
        }

        function createPiece(typeIndex) {
            const shape = SHAPES[typeIndex].map(row => [...row]);
            return {
                shape: shape,
                color: COLORS[typeIndex],
                x: Math.floor(COLS / 2) - Math.ceil(shape[0].length / 2),
                y: 0
            };
        }

        function randomPiece() {
            return createPiece(Math.floor(Math.random() * 7));
        }

        function rotate(matrix) {
            const rows = matrix.length;
            const cols = matrix[0].length;
            const rotated = Array(cols).fill(null).map(() => Array(rows).fill(0));
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    rotated[x][rows - 1 - y] = matrix[y][x];
                }
            }
            return rotated;
        }

        function isValid(piece, offsetX = 0, offsetY = 0, newShape = null) {
            const shape = newShape || piece.shape;
            for (let y = 0; y < shape.length; y++) {
                for (let x = 0; x < shape[y].length; x++) {
                    if (shape[y][x]) {
                        const newX = piece.x + x + offsetX;
                        const newY = piece.y + y + offsetY;
                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return false;
                        }
                        if (newY >= 0 && board[newY][newX]) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        function placePiece() {
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        const boardY = currentPiece.y + y;
                        const boardX = currentPiece.x + x;
                        if (boardY >= 0) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                }
            }
        }

        function clearLines() {
            let linesCleared = 0;
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell !== 0)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(0));
                    linesCleared++;
                    y++;
                }
            }
            if (linesCleared > 0) {
                const points = [0, 100, 300, 500, 800];
                score += points[linesCleared] * level;
                lines += linesCleared;
                level = Math.floor(lines / 10) + 1;
                dropInterval = Math.max(100, 1000 - (level - 1) * 100);
                updateDisplay();
            }
        }

        function updateDisplay() {
            scoreEl.textContent = score;
            levelEl.textContent = level;
            linesEl.textContent = lines;
        }

        function drawBlock(context, x, y, color, size) {
            context.fillStyle = color;
            context.fillRect(x * size, y * size, size - 1, size - 1);
            context.fillStyle = 'rgba(255, 255, 255, 0.3)';
            context.fillRect(x * size, y * size, size - 1, 3);
            context.fillRect(x * size, y * size, 3, size - 1);
            context.fillStyle = 'rgba(0, 0, 0, 0.3)';
            context.fillRect(x * size + size - 4, y * size, 3, size - 1);
            context.fillRect(x * size, y * size + size - 4, size - 1, 3);
        }

        function draw() {
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x]) {
                        drawBlock(ctx, x, y, board[y][x], BLOCK_SIZE);
                    }
                }
            }

            if (currentPiece) {
                for (let y = 0; y < currentPiece.shape.length; y++) {
                    for (let x = 0; x < currentPiece.shape[y].length; x++) {
                        if (currentPiece.shape[y][x]) {
                            drawBlock(ctx, currentPiece.x + x, currentPiece.y + y, 
                                      currentPiece.color, BLOCK_SIZE);
                        }
                    }
                }
            }

            if (paused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffeb3b';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
            }
        }

        function drawNext() {
            nextCtx.fillStyle = '#0f0f1a';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (nextPiece) {
                const shape = nextPiece.shape;
                const offsetX = (nextCanvas.width / NEXT_BLOCK_SIZE - shape[0].length) / 2;
                const offsetY = (nextCanvas.height / NEXT_BLOCK_SIZE - shape.length) / 2;
                
                for (let y = 0; y < shape.length; y++) {
                    for (let x = 0; x < shape[y].length; x++) {
                        if (shape[y][x]) {
                            drawBlock(nextCtx, offsetX + x, offsetY + y, 
                                      nextPiece.color, NEXT_BLOCK_SIZE);
                        }
                    }
                }
            }
        }

        function moveDown() {
            if (isValid(currentPiece, 0, 1)) {
                currentPiece.y++;
            } else {
                placePiece();
                clearLines();
                currentPiece = nextPiece;
                nextPiece = randomPiece();
                drawNext();
                
                if (!isValid(currentPiece)) {
                    gameOver = true;
                    showGameOver();
                }
            }
        }

        function moveLeft() {
            if (isValid(currentPiece, -1, 0)) {
                currentPiece.x--;
            }
        }

        function moveRight() {
            if (isValid(currentPiece, 1, 0)) {
                currentPiece.x++;
            }
        }

        function rotatePiece() {
            const rotated = rotate(currentPiece.shape);
            if (isValid(currentPiece, 0, 0, rotated)) {
                currentPiece.shape = rotated;
            } else if (isValid(currentPiece, -1, 0, rotated)) {
                currentPiece.x--;
                currentPiece.shape = rotated;
            } else if (isValid(currentPiece, 1, 0, rotated)) {
                currentPiece.x++;
                currentPiece.shape = rotated;
            }
        }

        function hardDrop() {
            while (isValid(currentPiece, 0, 1)) {
                currentPiece.y++;
                score += 2;
            }
            placePiece();
            clearLines();
            currentPiece = nextPiece;
            nextPiece = randomPiece();
            drawNext();
            
            if (!isValid(currentPiece)) {
                gameOver = true;
                showGameOver();
            }
            updateDisplay();
        }

        function showGameOver() {
            overlay.style.display = 'block';
            finalScoreEl.textContent = score;
        }

        function restartGame() {
            board = createBoard();
            score = 0;
            level = 1;
            lines = 0;
            gameOver = false;
            paused = false;
            dropInterval = 1000;
            currentPiece = randomPiece();
            nextPiece = randomPiece();
            overlay.style.display = 'none';
            updateDisplay();
            drawNext();
            lastDrop = performance.now();
            if (!animationId) {
                gameLoop();
            }
        }

        function togglePause() {
            if (gameOver) return;
            paused = !paused;
            if (!paused) {
                lastDrop = performance.now();
            }
        }

        function gameLoop(timestamp = 0) {
            if (gameOver) return;
            
            animationId = requestAnimationFrame(gameLoop);
            
            if (!paused) {
                if (timestamp - lastDrop > dropInterval) {
                    moveDown();
                    lastDrop = timestamp;
                }
            }
            
            draw();
        }

        document.addEventListener('keydown', (e) => {
            if (gameOver) {
                if (e.code === 'Space' || e.code === 'Enter') {
                    restartGame();
                }
                return;
            }

            switch (e.code) {
                case 'ArrowLeft':
                    if (!paused) { moveLeft(); draw(); }
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (!paused) { moveRight(); draw(); }
                    e.preventDefault();
                    break;
                case 'ArrowUp':
                    if (!paused) { rotatePiece(); draw(); }
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (!paused) { moveDown(); draw(); }
                    e.preventDefault();
                    break;
                case 'Space':
                    if (!paused) { hardDrop(); draw(); }
                    e.preventDefault();
                    break;
                case 'KeyP':
                    togglePause();
                    draw();
                    e.preventDefault();
                    break;
            }
        });

        restartGame();
    </script>
</body>
</html>

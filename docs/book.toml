[book]
title = "Codex vs OpenHands 벤치마크 튜토리얼"
authors = ["SooHyoung Oh"]
language = "ko"
description = "로컬 qwen-122b 위에서 Codex CLI와 OpenHands를 같은 조건으로 비교 검증하는 과정을 초보자가 따라하며 수행하고 해석하는 튜토리얼"
src = "."

[build]
build-dir = "../docs"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/ohama/CodexWithLocalLLM"
edit-url-template = "https://github.com/ohama/CodexWithLocalLLM/edit/main/book/{path}"

[output.html.search]
enable = true
limit-results = 30
boost-title = 2
boost-hierarchy = 1
